<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Time tracking dashboard</title>

  <link rel="stylesheet" href="time-tracking-dashboard-main/dashboard.css">


</head>
<body>
  <div id="maincont">
    <div id="leftcont">
      <div id="profile">
        <img src="time-tracking-dashboard-main/images/image-jeremy.png" alt="image-jeremy">
        <div id="person">
        <p id="one">Report for</p>
        <p id="two">Jeremy Robson</p>
        </div>

      </div>

      <div id="period">
        <p class="period js-daily">Daily</p>
        <p class="period js-weekly">Weekly</p>
        <p class="period js-monthly">Monthly</p>
      </div>
    </div>

    <div id="rightcont">
      <div id="first" class="dashboard">
        <div id="work" class="back"><img src="time-tracking-dashboard-main/images/icon-work.svg" alt="">
        
        </div> 

        <div class="information">
          <div class="top">
            <p>Work</p>
            <div class="dot">...</div>
          </div>

          <div class="btm">

          <p class="hours js-current">32hrs</p>
          <div>
            <p class="previous js-previous">Previous - 36hrs</p>
          </div>
          </div>
        </div>
      </div>

      <div class="dashboard">
        <div id="play" class="back"><img src="time-tracking-dashboard-main/images/icon-play.svg" alt=""></div> 

        <div class="information">
          <div class="top">
            <p class="js-title">Play</p>
            <div class="dot">...</div>
          </div>

          <div class="btm" >

          <p class="hours js-play-current">10hrs</p>
          <div><p class="previous js-play-previous">Previous - 8hrs</p></div>
          </div>

        </div>
      </div>

       <div class="dashboard">
        <div id="study" class="back"><img src="time-tracking-dashboard-main/images/icon-study.svg" alt=""></div> 

        <div class="information">
          <div class="top">
            <p class="js-title ">Study</p>
            <div class="dot">...</div>
          </div>

          <div class="btm">

          <p class="hours js-study-current">4hrs</p>
          <div>
          <p class="previous js-study-previous">Previous - 7hrs</p></div>
          </div>


        </div>
      </div>

      <div class="dashboard">
        <div id="exercise" class="back"><img src="time-tracking-dashboard-main/images/icon-exercise.svg" alt=""></div> 

        <div class="information">
          <div class="top">
            <p class="js-title">Exercise</p>
            <div class="dot">...</div>
          </div>

          <div class="btm">

          <p class="hours js-exercise-current">4hrs</p>
          <div>
          <p class="previous js-exercise-previous">Previous - 5hrs</p></div>
          </div>

        </div>
      </div>

      <div class="dashboard">
        <div id="social" class="back"><img src="time-tracking-dashboard-main/images/icon-social.svg" alt=""></div> 

        <div class="information">
          <div class="top">
            <p class="js-title">Social</p>
            <div class="dot">...</div>
          </div>

          <div class="btm">

          <p class="hours js-social-current">5hrs</p>
          <div>
          <p class="previous js-social-previous">Previous - 10hrs</p></div>
          </div>


        </div>
      </div>

      <div class="dashboard">
        <div id="selfcare" class="back"><img src="time-tracking-dashboard-main/images/icon-self-care.svg" alt=""></div> 

        <div class="information">
          <div class="top">
            <p class="js-title">Self Care </p>
            <div class="dot">...</div>
          </div>

          <div class="btm">

          <p class="hours js-care-current">2hrs</p>
          <div>
          <p class="previous js-care-previous">Previous - 2hrs</p></div>
          </div>


        </div>
      </div>


    </div>

  </div>
  
  <script src="time-tracking-dashboard-main/dashboard.js"></script>
</body>
</html>
